<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Calculadora de Emissão de CO₂</title>
  <link rel="stylesheet" href="./css/style.css" />
</head>
<body>
  <header class="top-header">
    <div class="container">
      <h1>🌱 Calculadora de Emissão de CO₂</h1>
      <p class="subtitle">Planeje viagens e acompanhe seu impacto ambiental.</p>
    </div>
  </header>

  <main class="container page-content">
    <section class="card">
      <form id="calculator-form" class="grid">
        <div>
          <label for="origem">📍 Origem</label>
          <input
            type="text"
            id="origem"
            list="cities-list"
            placeholder="Ex.: São Paulo, SP"
            required
          />
        </div>

        <div>
          <label for="destino">🏁 Destino</label>
          <input
            type="text"
            id="destino"
            list="cities-list"
            placeholder="Ex.: Campinas, SP"
            required
          />
        </div>

        <datalist id="cities-list"></datalist>

        <div class="full">
          <label for="distancia">📏 Distância (km)</label>
          <input
            type="number"
            id="distancia"
            min="0"
            step="0.1"
            placeholder="Preenchimento automático"
            required
          />
          <label class="check-inline">
            <input type="checkbox" id="manualDistancia" />
            Inserir distância manualmente
          </label>
          <small id="distance-helper">Informe origem e destino para tentar preencher automaticamente.</small>
        </div>

        <div class="full">
          <label>🚦 Meio de transporte</label>
          <div class="transport-options" role="radiogroup" aria-label="Meio de transporte">
            <button type="button" class="transport-card" data-value="bike" aria-pressed="false">
              <span class="emoji">🚲</span>
              <span class="name">Bicicleta</span>
            </button>

            <button type="button" class="transport-card" data-value="car" aria-pressed="false">
              <span class="emoji">🚗</span>
              <span class="name">Carro</span>
            </button>

            <button type="button" class="transport-card" data-value="bus" aria-pressed="false">
              <span class="emoji">🚌</span>
              <span class="name">Ônibus</span>
            </button>

            <button type="button" class="transport-card" data-value="truck" aria-pressed="false">
              <span class="emoji">🚚</span>
              <span class="name">Caminhão</span>
            </button>
          </div>
        </div>

        <div class="full">
          <button type="submit">🧮 Calcular Emissão</button>
        </div>
      </form>
    </section>

    <section id="results-section" class="card hidden">
      <div id="results-content"></div>
    </section>

    <section id="comparison-section" class="card hidden">
      <div id="comparison-content"></div>
    </section>

    <section id="carbon-credits-section" class="card hidden">
      <div id="carbon-credits-content"></div>
    </section>
  </main>

  <footer class="site-footer">
    <div class="container">
      <p>Desenvolvido com ❤️ para a DIO | Projeto GitHub Copilot do Pedro</p>
    </div>
  </footer>

  <script src="./js/routes-data.js"></script>
  <script src="./js/config.js"></script>
  <script src="./js/calculator.js"></script>
  <script src="./js/ui.js"></script>
  <script src="./js/app.js"></script>
</body>
</html>
